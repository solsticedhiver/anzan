name: App Android Release

on:
  push:
    branches: [ main ]

jobs:
  android:
    name: Build and create android release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Create version
      id: version
      run: echo "version=$(grep ^version pubspec.yaml |cut -f 2 -d ' '|cut -f 1 -d '+')" >> $GITHUB_OUTPUT
    - name: Get HEAD short sha
      id: short_sha
      run: echo "short_sha=$(echo ${{ github.sha }}|head -c 7)" >> $GITHUB_OUTPUT
      shell: bash
    - name: set HEAD git short sha in config.dart
      run: sed -i "/commit/s/HEAD/${{ steps.short_sha.outputs.short_sha }}/" lib/config.dart
      shell: bash
    - name: Use apt-cacher-ng
      if: ${{ env.ACT }}
      run: |
        echo 'Acquire::HTTP::Proxy "http://0.0.0.0:3142";' >> /etc/apt/apt.conf.d/01proxy
        echo 'Acquire::HTTPS::Proxy "false";' >> /etc/apt/apt.conf.d/01proxy
    - name: Update cache
      run: sudo apt update
    - name: Install dependencies for flutter
      run: sudo apt install -y ninja-build libgtk-3-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
    - name: install missing tools [act]
      if: ${{ env.ACT }}
      run: |
        sudo apt install -y cmake clang libstdc++-12-dev lld android-sdk openjdk-21-jdk
        if [ ! -d /usr/lib/android-sdk/cmdline-tools/latest ] ; then
        sudo wget https://dl.google.com/android/repository/commandlinetools-linux-14742923_latest.zip
        sudo unzip commandlinetools-linux-14742923_latest.zip -d /usr/lib/android-sdk
        sudo mkdir -p /usr/lib/android-sdk/cmdline-tools/latest
        sudo mv /usr/lib/android-sdk/cmdline-tools/* /usr/lib/android-sdk/cmdline-tools/latest || true
        # install the same tools as in <flutterSDK>/engine/src/flutter/tools/android_sdk/packages.txt
        yes | sudo /usr/lib/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        sudo /usr/lib/android-sdk/cmdline-tools/latest/bin/sdkmanager --install "build-tools;36.1.0"
        sudo /usr/lib/android-sdk/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36"
        sudo /usr/lib/android-sdk/cmdline-tools/latest/bin/sdkmanager --install "cmake;3.22.1"
        sudo /usr/lib/android-sdk/cmdline-tools/latest/bin/sdkmanager --install "platform-tools"
        sudo /usr/lib/android-sdk/cmdline-tools/latest/bin/sdkmanager --install "ndk;28.2.13676358"
        fi
    - uses: subosito/flutter-action@v2
      with:
        channel : 'stable'
        cache: true
    - name: fix git repo in flutter install and paths [act]
      if: ${{ env.ACT }}
      run: |
        git config --global --add safe.directory /opt/hostedtoolcache/flutter/stable-*
        flutter config --jdk-dir=/usr/lib/jvm/java-21-openjdk-amd64
        flutter config --android-sdk=/usr/lib/android-sdk
        yes | flutter doctor --android-licenses &>/dev/null
        flutter clean
    - run: flutter pub get
    - run: flutter config --enable-android
    - run: flutter build apk --release --split-per-abi
    - run: |
        mv build/app/outputs/apk/release/app-armeabi-v7a-release.apk build/app/outputs/apk/release/anzan-android-armeabi-v7a.apk
        mv build/app/outputs/apk/release/app-arm64-v8a-release.apk build/app/outputs/apk/release/anzan-android-arm64-v8a.apk
        mv build/app/outputs/apk/release/app-x86_64-release.apk build/app/outputs/apk/release/anzan-android-x86_64.apk
    - name: Create a release in GitHub
      if: ${{ !env.ACT }}
      uses: ncipollo/release-action@v1
      with:
        allowUpdates: true
        artifacts: 'build/app/outputs/apk/release/anzan-*.apk'
        token: "${{ secrets.GH_TOKEN }}"
        tag: "v${{ steps.version.outputs.version }}"
        commit: "${{ github.sha }}"
