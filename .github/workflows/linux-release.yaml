name: App Linux Release

on:
  push:
    branches: [ main ]

jobs:
  linux:
    name: Build and create linux release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Create version
      id: version
      run: echo "version=$(grep ^version pubspec.yaml |cut -f 2 -d ' '|cut -f 1 -d '+')" >> $GITHUB_OUTPUT
    - name: Get HEAD short sha
      id: short_sha
      run: echo "short_sha=$(echo ${{ github.sha }}|head -c 7)" >> $GITHUB_OUTPUT
      shell: bash
    - name: set HEAD git short sha in config.dart
      run: sed -i "/commit/s/HEAD/${{ steps.short_sha.outputs.short_sha }}/" lib/config.dart
      shell: bash
    - uses: subosito/flutter-action@v2
      with:
        channel : 'stable'
        cache: true
    - name: fix git repo in flutter install
      if: ${{ env.ACT }}
      run: git config --global --add safe.directory /opt/hostedtoolcache/flutter/stable-*
      shell: bash
    - name: Use apt-cacher-ng
      if: ${{ env.ACT }}
      run: |
        echo 'Acquire::HTTP::Proxy "http://172.17.0.1:3142";' >> /etc/apt/apt.conf.d/01proxy
        echo 'Acquire::HTTPS::Proxy "false";' >> /etc/apt/apt.conf.d/01proxy
    - name: Update package cache
      run: sudo apt update
    - name: Install dependencies for flutter
      run: sudo apt install -y ninja-build libgtk-3-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
    - name: Install missing dep [act]
      if: ${{ env.ACT }}
      run: |
        sudo apt install -y cmake clang libstdc++-12-dev lld
        flutter clean
    - name: Build with flutter
      run: |
        flutter pub get
        flutter config --enable-linux-desktop
        flutter build linux --release
        mv build/linux/x64/release/bundle build/linux/x64/release/anzan-${{ steps.version.outputs.version }}/
    - name: Archive release
      uses: thedoctor0/zip-release@0.7.5
      with:
        type: 'tar'
        directory: 'build/linux/x64/release/'
        path: 'anzan-${{ steps.version.outputs.version }}'
        filename: 'anzan-linux_x64.tar.gz'
    - name: Create a release in GitHub
      if: ${{ !env.ACT }}
      uses: ncipollo/release-action@v1
      with:
        allowUpdates: true
        artifacts: 'build/linux/x64/release/anzan-linux_x64.tar.gz'
        token: "${{ secrets.GH_TOKEN }}"
        tag: "v${{ steps.version.outputs.version }}"
        commit: "${{ github.sha }}"
