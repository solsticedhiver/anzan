name: anzan
title: Anzan or mental calculation app
base: core24
version: '0.6.1'
icon: snap/gui/anzan.png
summary: Exercise your mental calculation skills (by visualising a soroban or not)
description: |
  An app to help you practice mental calculation by flashing numbers
  on screen that you must sum, or subtract

contact: solstice.dhiver@sorobanexam.org
issues: https://github.com/solsticedhiver/anzan/issues
source-code: https://github.com/solsticedhiver/anzan
website: https://www.sorobanexam.org/anzan.html
donation: https://www.sorobanexam.org/about.html
license: GPL-3.0-or-later
grade: stable
confinement: strict
platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]

parts:
  anzan:
    source: .
    plugin: flutter
    flutter-target: lib/main.dart
    flutter-channel: stable
    build-packages: [pkg-config, ninja-build, cmake, libgtk-3-dev, clang, libstdc++-12-dev, llvm, lld]
    stage-packages: [libmpv2, libblas3, liblapack3]
  cleanup:
    after:
      - anzan
    plugin: nil
    override-prime: |
      find $SNAPCRAFT_PRIME/usr/lib -type f,l -name 'libLLVM*.so*' -delete
      rm -rf "$SNAPCRAFT_PRIME/usr/share/man"
      rm -rf "$SNAPCRAFT_PRIME/usr/share/doc"
      rm -rf "$SNAPCRAFT_PRIME/usr/include"
      rm -rf "$SNAPCRAFT_PRIME/usr/share/perl*"
apps:
  anzan:
    command: anzan
    extensions: [gnome]
    plugs:
      - network
      - desktop
      - wayland
      - x11
      - home
      - audio-playback
      - opengl
    environment:
      LD_LIBRARY_PATH: "$LD_LIBRARY_PATH:$SNAP/usr/lib/x86_64-linux-gnu/blas:$SNAP/usr/lib/x86_64-linux-gnu/lapack"

# vim: set et ts=2 sw=2:
