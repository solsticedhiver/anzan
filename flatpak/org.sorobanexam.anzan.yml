# yaml-language-server: $schema=https://raw.githubusercontent.com/flatpak/flatpak-builder/main/data/flatpak-manifest.schema.json

---
app-id: org.sorobanexam.anzan
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: anzan
separate-locales: false
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --filesystem=xdg-download
modules:
  - name: ffmpeg
    config-opts:
      - --enable-shared
      - --disable-static
      - --enable-gpl
      - --disable-debug
      - --enable-gnutls
      - --disable-doc
      - --enable-encoder=png
      - --disable-libv4l2
      - --enable-libdav1d
    sources:
      - type: archive
        url: https://ffmpeg.org/releases/ffmpeg-8.1.tar.gz
        sha256: b13510e7a6a4ca28fa04307f2be54ef5a31e168eb2bbe055a7f4e4d2cadd51b1
    cleanup:
      - '/lib/*.a'
      - '/share/name'
      - '/share/ffmpeg/examples'
  - name: libass
    config-opts:
      - --enable-shared
      - --disable-static
      - --with-pic
    sources:
      - type: archive
        url: https://github.com/libass/libass/releases/download/0.17.4/libass-0.17.4.tar.gz
        sha256: a886b3b80867f437bc55cff3280a652bfa0d37b43d2aff39ddf3c4f288b8c5a8
  # Dependency for libplacebo. Generated with `flatpak-pip-generator --runtime=org.freedesktop.Sdk//25.08 --yaml jinja2`
  - name: python3-jinja2
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
        --prefix=${FLATPAK_DEST} "jinja2" --no-build-isolation
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/62/a1/3d680cbfd5f4b8f15abc1d571870c5fc3e594bb582bc3b64ea099db13e56/jinja2-3.1.6-py3-none-any.whl
        sha256: 85ece4451f492d0c13c5dd7c13a64681a86afae63a5f347908daf103ce6d2f67
      - type: file
        url: https://files.pythonhosted.org/packages/7e/99/7690b6d4034fffd95959cbe0c02de8deb3098cc577c67bb6a24fe5d7caa7/markupsafe-3.0.3.tar.gz
        sha256: 722695808f4b6457b320fdc131280796bdceb04ab50fe1795cd540799ebe1698
  - name: libplacebo
    cleanup:
      - '/include'
      - '/lib/pkgconfig'
    buildsystem: meson
    config-opts:
      - -Dvulkan=disabled
      - -Dshaderc=disabled
      - -Dvulkan=disabled
      - -Dvk-proc-addr=disabled
      - -Dvulkan-registry=disabled
      - -Dopengl=disabled
      - -Dgl-proc-addr=disabled
      - -Dd3d11=disabled
      - -Dglslang=disabled
      - -Dshaderc=disabled
      - -Dlcms=disabled
      - -Ddovi=disabled
      - -Dlibdovi=disabled
      - -Dunwind=disabled
      - -Dxxhash=disabled
      - -Ddemos=false
    sources:
      - type: archive
        url: https://github.com/haasn/libplacebo/archive/refs/tags/v7.360.1.tar.gz
        sha256: d05fdf90bea2f629eaa2d115e909fd356388ac639e54f77b87a018a6d76224bd
  - name: libmpv
    cleanup:
      - '/include'
      - '/lib/pkgconfig'
      - 'lib/*.a'
    buildsystem: meson
    config-opts:
      - -Dbuild-date=false
      - -Dlibmpv=true
      - -Dcplayer=false
    sources:
      - type: archive
        url: https://github.com/mpv-player/mpv/archive/refs/tags/v0.41.0.tar.gz
        sha256: ee21092a5ee427353392360929dc64645c54479aefdb5babc5cfbb5fad626209

  - name: Anzan
    buildsystem: simple
    only-arches:
      - x86_64
    build-commands:
      - cp anzan /app/
      - cp -a lib /app/
      - cp -a data /app/
      - mkdir -p /app/bin
      - ln -s /app/anzan /app/bin/anzan
      - mkdir -p /app/share/{metainfo,applications,icons/hicolor/256x256/apps}
      - cp org.sorobanexam.anzan.png /app/share/icons/hicolor/256x256/apps
      - cp org.sorobanexam.anzan.desktop /app/share/applications/
      - cp org.sorobanexam.anzan.metainfo.xml /app/share/metainfo/
    sources:
      - type: dir
        path: anzan
      - type: file
        path: org.sorobanexam.anzan.png
      - type: file
        path: org.sorobanexam.anzan.metainfo.xml
      - type: file
        path: org.sorobanexam.anzan.desktop
    cleanup:
      - '/lib/*.a'
      - '/lib/debug'
      - '/lib/python*'
      - '/lib/pkgconfig'

# vim: set et ts=2 sw=2:
