      flex: auto;
      flex-direction: column;

    }
    .img {
	    width: 512px;
    }
    .loader {
      width: fit-content;
      font-family: monospace;

      padding-bottom: 8px;

    .loader:before {
      content:"Loading..."
    }
    .msg {
      padding: 25px 15px 25px 15px;
      font-style: italic;
      margin-left: auto;
      margin-right: auto;
    }
    .msg a {
      color: #168362;
    }
    @keyframes l2 {to{background-size: 100% 3px}}
    @media screen and (max-width: 512px) {
      .img {
        width: 256px;
        height: 256px;
      }
      .loader {
        font-size: 15px;
      }
    }
    @media (prefers-color-scheme: light) {
      body {
        background: #FFF;
        color: #333;
      }
      .msg a {
        color: #168362;
      }
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: #333;
        color: #FFF;
